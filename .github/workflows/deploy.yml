name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish FSDInfo.csproj -c Release -o ./publish

      - name: Push artifacts to build repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BUILD_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          cd ./publish
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy from ${{ github.sha }}"
          git remote add origin git@github.com:mortenmoulder/fsdinfo.dk-build.git
          git push --force origin HEAD:main
